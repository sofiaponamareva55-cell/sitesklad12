```html id="warehouse-live-system"
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warehouse System</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#f3f4f6;
    color:#333;
}

/* HEADER */

header{
    background:#111827;
    color:white;
    padding:20px 40px;

    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:24px;
    font-weight:bold;
}

.search-box input{
    padding:10px;
    width:250px;
    border:none;
    border-radius:10px;
    outline:none;
}

/* MAIN */

.container{
    padding:40px;
}

.top-panel{
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
    margin-bottom:30px;
}

.top-panel h2{
    margin-bottom:20px;
}

.top-panel input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:10px;
}

.top-panel button{
    padding:12px 20px;
    border:none;
    border-radius:10px;
    background:#16a34a;
    color:white;
    cursor:pointer;
    transition:0.3s;
}

.top-panel button:hover{
    background:#15803d;
}

/* TABLE */

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

th{
    background:#111827;
    color:white;
    padding:15px;
}

td{
    padding:15px;
    border-bottom:1px solid #eee;
    text-align:center;
}

.delete-btn{
    background:#ef4444;
    color:white;
    border:none;
    padding:8px 12px;
    border-radius:8px;
    cursor:pointer;
}

.delete-btn:hover{
    background:#dc2626;
}

.status{
    padding:5px 10px;
    border-radius:8px;
    color:white;
    font-size:13px;
}

.green{
    background:#22c55e;
}

.orange{
    background:#f59e0b;
}

.red{
    background:#ef4444;
}

/* FOOTER */

footer{
    margin-top:40px;
    background:#111827;
    color:white;
    text-align:center;
    padding:20px;
}

</style>
</head>

<body>

<header>

    <div class="logo">
        Warehouse System
    </div>

    <div class="search-box">
        <input
            type="text"
            id="searchInput"
            placeholder="Поиск товара..."
            onkeyup="searchProducts()"
        >
    </div>

</header>

<div class="container">

    <!-- ДОБАВЛЕНИЕ -->

    <div class="top-panel">

        <h2>Добавить товар</h2>

        <input
            type="text"
            id="productName"
            placeholder="Название товара"
        >

        <input
            type="number"
            id="productCount"
            placeholder="Количество"
        >

        <button onclick="addProduct()">
            Добавить товар
        </button>

    </div>

    <!-- ТАБЛИЦА -->

    <table id="productTable">

        <thead>

            <tr>
                <th>Товар</th>
                <th>Количество</th>
                <th>Статус</th>
                <th>Удалить</th>
            </tr>

        </thead>

        <tbody id="tableBody">

            <tr>

                <td>Яблоки</td>

                <td>120</td>

                <td>
                    <span class="status green">
                        В наличии
                    </span>
                </td>

                <td>
                    <button class="delete-btn"
                    onclick="deleteRow(this)">
                        Удалить
                    </button>
                </td>

            </tr>

            <tr>

                <td>Молоко</td>

                <td>25</td>

                <td>
                    <span class="status orange">
                        Мало
                    </span>
                </td>

                <td>
                    <button class="delete-btn"
                    onclick="deleteRow(this)">
                        Удалить
                    </button>
                </td>

            </tr>

        </tbody>

    </table>

</div>

<footer>
    © 2026 Warehouse System
</footer>

<script>

/* ДОБАВЛЕНИЕ ТОВАРА */

function addProduct(){

    let name =
        document.getElementById("productName").value;

    let count =
        document.getElementById("productCount").value;

    if(name === "" || count === ""){

        alert("Заполните все поля!");

        return;
    }

    let statusText = "";
    let statusClass = "";

    if(count > 50){

        statusText = "В наличии";
        statusClass = "green";

    }else if(count > 10){

        statusText = "Мало";
        statusClass = "orange";

    }else{

        statusText = "Заканчивается";
        statusClass = "red";
    }

    let row = `
    
    <tr>

        <td>${name}</td>

        <td>${count}</td>

        <td>
            <span class="status ${statusClass}">
                ${statusText}
            </span>
        </td>

        <td>
            <button class="delete-btn"
            onclick="deleteRow(this)">
                Удалить
            </button>
        </td>

    </tr>

    `;

    document.getElementById("tableBody")
        .innerHTML += row;

    document.getElementById("productName").value = "";
    document.getElementById("productCount").value = "";
}

/* УДАЛЕНИЕ */

function deleteRow(button){

    button.parentElement.parentElement.remove();
}

/* ПОИСК */

function searchProducts(){

    let input =
        document.getElementById("searchInput")
        .value.toLowerCase();

    let rows =
        document.querySelectorAll("#tableBody tr");

    rows.forEach(row => {

        let text =
            row.innerText.toLowerCase();

        if(text.includes(input)){

            row.style.display = "";

        }else{

            row.style.display = "none";
        }

    });
}

</script>

</body>
</html>
```
