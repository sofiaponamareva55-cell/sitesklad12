<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Warehouse Dashboard</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    background:#f1f5f9;
    color:#1e293b;
}

/* HEADER */

header{
    width:100%;
    background:#0f172a;
    color:white;

    padding:20px 40px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

.logo{
    font-size:24px;
    font-weight:700;
}

.search-box{
    position:relative;
}

.search-box input{

    width:260px;

    padding:12px 15px;

    border:none;
    border-radius:12px;

    outline:none;

    background:#1e293b;
    color:white;

    transition:0.3s;
}

.search-box input:focus{
    background:#334155;
}

/* MAIN */

.container{
    max-width:1200px;
    margin:auto;
    padding:40px 20px;
}

/* CARDS */

.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-bottom:35px;
}

.card{
    background:white;
    border-radius:20px;
    padding:25px;

    box-shadow:0 5px 20px rgba(0,0,0,0.06);

    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card h3{
    font-size:15px;
    color:#64748b;
    margin-bottom:10px;
}

.card .number{
    font-size:32px;
    font-weight:700;
}

/* PANEL */

.panel{
    background:white;
    padding:30px;
    border-radius:20px;

    box-shadow:0 5px 20px rgba(0,0,0,0.06);

    margin-bottom:30px;
}

.panel h2{
    margin-bottom:20px;
}

.inputs{
    display:grid;
    grid-template-columns:1fr 1fr auto;
    gap:15px;
}

.inputs input{

    padding:14px;

    border:1px solid #dbe2ea;
    border-radius:12px;

    font-size:15px;
    outline:none;

    transition:0.3s;
}

.inputs input:focus{
    border-color:#3b82f6;
}

.inputs button{

    padding:14px 24px;

    border:none;
    border-radius:12px;

    background:#2563eb;
    color:white;

    font-weight:600;

    cursor:pointer;

    transition:0.3s;
}

.inputs button:hover{
    background:#1d4ed8;
}

/* TABLE */

.table-wrapper{

    overflow-x:auto;

    background:white;

    border-radius:20px;

    box-shadow:0 5px 20px rgba(0,0,0,0.06);
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#0f172a;
    color:white;
    padding:18px;
    text-align:left;
}

td{
    padding:18px;
    border-bottom:1px solid #e2e8f0;
}

tr{
    transition:0.2s;
}

tr:hover{
    background:#f8fafc;
}

.status{
    padding:6px 12px;
    border-radius:30px;
    font-size:13px;
    font-weight:600;
    color:white;
}

.green{
    background:#22c55e;
}

.orange{
    background:#f59e0b;
}

.red{
    background:#ef4444;
}

.delete-btn{

    border:none;

    padding:10px 14px;

    border-radius:10px;

    background:#ef4444;
    color:white;

    cursor:pointer;

    transition:0.3s;
}

.delete-btn:hover{
    background:#dc2626;
}

/* EMPTY */

.empty{
    text-align:center;
    padding:30px;
    color:#94a3b8;
}

/* FOOTER */

footer{

    margin-top:40px;

    background:#0f172a;

    color:white;

    text-align:center;

    padding:20px;
}

/* MOBILE */

@media(max-width:768px){

    header{
        flex-direction:column;
        gap:15px;
        padding:20px;
    }

    .search-box input{
        width:100%;
    }

    .inputs{
        grid-template-columns:1fr;
    }
}

</style>
</head>

<body>

<header>

    <div class="logo">
        Warehouse Dashboard
    </div>

    <div class="search-box">

        <input
            type="text"
            id="searchInput"
            placeholder="Поиск товара..."
            onkeyup="searchProducts()"
        >

    </div>

</header>

<div class="container">

    <!-- STATS -->

    <div class="stats">

        <div class="card">
            <h3>Всего товаров</h3>
            <div class="number" id="totalProducts">
                2
            </div>
        </div>

        <div class="card">
            <h3>Товаров в наличии</h3>
            <div class="number" id="availableProducts">
                2
            </div>
        </div>

        <div class="card">
            <h3>Низкий остаток</h3>
            <div class="number" id="lowProducts">
                1
            </div>
        </div>

    </div>

    <!-- PANEL -->

    <div class="panel">

        <h2>Добавить товар</h2>

        <div class="inputs">

            <input
                type="text"
                id="productName"
                placeholder="Название товара"
            >

            <input
                type="number"
                id="productCount"
                placeholder="Количество"
            >

            <button onclick="addProduct()">
                Добавить
            </button>

        </div>

    </div>

    <!-- TABLE -->

    <div class="table-wrapper">

        <table>

            <thead>

                <tr>

                    <th>Товар</th>
                    <th>Количество</th>
                    <th>Статус</th>
                    <th>Удалить</th>

                </tr>

            </thead>

            <tbody id="tableBody">

                <tr>

                    <td>Яблоки</td>

                    <td>120</td>

                    <td>
                        <span class="status green">
                            В наличии
                        </span>
                    </td>

                    <td>
                        <button class="delete-btn"
                        onclick="deleteRow(this)">
                            Удалить
                        </button>
                    </td>

                </tr>

                <tr>

                    <td>Молоко</td>

                    <td>18</td>

                    <td>
                        <span class="status orange">
                            Мало
                        </span>
                    </td>

                    <td>
                        <button class="delete-btn"
                        onclick="deleteRow(this)">
                            Удалить
                        </button>
                    </td>

                </tr>

            </tbody>

        </table>

    </div>

</div>

<footer>
    © 2026 Warehouse Dashboard
</footer>

<script>

/* ДОБАВЛЕНИЕ */

function addProduct(){

    let name =
        document.getElementById("productName").value.trim();

    let count =
        document.getElementById("productCount").value;

    if(name === "" || count === ""){

        alert("Заполните все поля");

        return;
    }

    let statusText = "";
    let statusClass = "";

    if(count > 50){

        statusText = "В наличии";
        statusClass = "green";

    }else if(count > 10){

        statusText = "Мало";
        statusClass = "orange";

    }else{

        statusText = "Заканчивается";
        statusClass = "red";
    }

    const row = document.createElement("tr");

    row.innerHTML = `

        <td>${name}</td>

        <td>${count}</td>

        <td>
            <span class="status ${statusClass}">
                ${statusText}
            </span>
        </td>

        <td>
            <button class="delete-btn"
            onclick="deleteRow(this)">
                Удалить
            </button>
        </td>

    `;

    document.getElementById("tableBody")
        .appendChild(row);

    document.getElementById("productName").value = "";
    document.getElementById("productCount").value = "";

    updateStats();
}

/* УДАЛЕНИЕ */

function deleteRow(button){

    button.parentElement.parentElement.remove();

    updateStats();
}

/* ПОИСК */

function searchProducts(){

    const input =
        document.getElementById("searchInput")
        .value.toLowerCase();

    const rows =
        document.querySelectorAll("#tableBody tr");

    rows.forEach(row => {

        const text =
            row.innerText.toLowerCase();

        row.style.display =
            text.includes(input)
            ? ""
            : "none";
    });
}

/* СТАТИСТИКА */

function updateStats(){

    const rows =
        document.querySelectorAll("#tableBody tr");

    let total = rows.length;

    let available = 0;

    let low = 0;

    rows.forEach(row => {

        const quantity =
            parseInt(
                row.children[1].innerText
            );

        if(quantity > 10){
            available++;
        }

        if(quantity <= 50){
            low++;
        }
    });

    document.getElementById("totalProducts")
        .innerText = total;

    document.getElementById("availableProducts")
        .innerText = available;

    document.getElementById("lowProducts")
        .innerText = low;
}

updateStats();

</script>

</body>
</html>
